<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 210" width="400" height="420">
  <!-- Monitor outer frame - dark -->
  <rect x="10" y="10" width="180" height="130" rx="14" ry="14" fill="#111111"/>
  <!-- Monitor screen area - slightly lighter -->
  <rect x="22" y="22" width="156" height="106" rx="8" ry="8" fill="#1c1c1c"/>

  <!-- Sunglasses frame - LEFT lens (white/light) -->
  <rect x="30" y="42" width="58" height="36" rx="10" ry="10" fill="none" stroke="#ffffff" stroke-width="5"/>
  <!-- Sunglasses frame - RIGHT lens (white/light) -->
  <rect x="112" y="42" width="58" height="36" rx="10" ry="10" fill="none" stroke="#ffffff" stroke-width="5"/>
  <!-- Bridge between lenses -->
  <line x1="88" y1="60" x2="112" y2="60" stroke="#ffffff" stroke-width="4"/>
  <!-- Left temple arm -->
  <line x1="30" y1="60" x2="10" y2="55" stroke="#ffffff" stroke-width="3.5"/>
  <!-- Right temple arm -->
  <line x1="170" y1="60" x2="190" y2="55" stroke="#ffffff" stroke-width="3.5"/>

  <!-- Mustache - Left curl (white) -->
  <path d="M 58 98 C 38 78, 22 82, 22 98 C 22 112, 44 116, 58 98 Z" fill="#ffffff"/>
  <!-- Mustache - Right curl (white) -->
  <path d="M 142 98 C 162 78, 178 82, 178 98 C 178 112, 156 116, 142 98 Z" fill="#ffffff"/>
  <!-- Mustache center fill -->
  <path d="M 58 98 Q 100 118 142 98 Q 130 108 100 108 Q 70 108 58 98 Z" fill="#ffffff"/>

  <!-- Monitor stand / neck -->
  <rect x="86" y="140" width="28" height="22" rx="4" ry="4" fill="#111111"/>
  <!-- Monitor base -->
  <rect x="54" y="162" width="92" height="14" rx="7" ry="7" fill="#111111"/>

  <!-- Red tie - knot triangle at base of monitor -->
  <polygon points="100,143 88,157 100,154 112,157" fill="#D62828"/>
  <!-- Red tie - long body pointing down -->
  <polygon points="88,157 100,154 112,157 107,195 100,200 93,195" fill="#D62828"/>
</svg>
