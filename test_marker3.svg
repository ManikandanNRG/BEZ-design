
<svg width="200" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- My L -5,-2 but without fill=none -->
    <marker orient="auto" refY="0" refX="0" id="test1" style="overflow:visible;" markerWidth="5" markerHeight="8">
      <path d="M 0,0 L -5,-2 C -4,-1 -4,1 -5,2 z" />
    </marker>
    <!-- My L -5,-2 WITH fill=none from CSS -->
    <marker orient="auto" refY="0" refX="0" id="test2" style="overflow:visible;" markerWidth="5" markerHeight="8">
      <path d="M 0,0 L -5,-2 C -4,-1 -4,1 -5,2 z" fill="none" stroke="black" stroke-width="2" />
    </marker>
  </defs>
  
  <line x1="100" y1="20" x2="100" y2="180" stroke="gray" stroke-width="2" />
  
  <!-- Path going Right -->
  <path d="M 100,60 L 150,60" fill="none" stroke="black" marker-start="url(#test1)" />
  <path d="M 100,100 L 150,100" fill="none" stroke="black" marker-start="url(#test2)" />
</svg>
